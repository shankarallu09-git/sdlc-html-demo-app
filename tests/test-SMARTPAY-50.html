<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Test Suite — SMARTPAY-50</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { color: #333; }
    .suite { background: white; border-radius: 8px; padding: 20px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h2 { font-size: 1rem; margin-bottom: 12px; color: #555; }
    .test { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.88rem; }
    .test:last-child { border-bottom: none; }
    .pass { color: #27ae60; font-weight: 700; }
    .fail { color: #e74c3c; font-weight: 700; }
    .skip { color: #f39c12; font-weight: 700; }
    #summary { background: #333; color: white; border-radius: 8px; padding: 16px; margin-top: 20px; font-size: 0.9rem; }
    #summary .green { color: #2ecc71; }
    #summary .red   { color: #e74c3c; }
  </style>
</head>
<body>
<h1>🧪 Test Suite — SMARTPAY-50</h1>
<p style="color:#888;font-size:.85rem">Bug: Task input should reject blank/whitespace-only task submissions</p>

<div id="results"></div>
<div id="summary"></div>

<script>
// ─── Minimal DOM stub (runs in browser, uses real DOM) ───
let passed = 0, failed = 0;
const suites = [];

function describe(name, fn) {
  const tests = [];
  suites.push({ name, tests });
  const _curr = tests;
  window._curr = _curr;
  fn();
}
function it(desc, fn) {
  try { fn(); window._curr.push({ desc, status: 'pass' }); passed++; }
  catch(e) { window._curr.push({ desc, status: 'fail', err: e.message }); failed++; }
}
function expect(val) {
  return {
    toBe: (exp) => { if (val !== exp) throw new Error(`Expected "${exp}", got "${val}"`); },
    toBeTruthy: () => { if (!val) throw new Error(`Expected truthy, got "${val}"`); },
    toBeFalsy: () => { if (val) throw new Error(`Expected falsy, got "${val}"`); },
    toContain: (s) => { if (!String(val).includes(s)) throw new Error(`"${val}" does not contain "${s}"`); },
    toHaveLength: (n) => { if (val.length !== n) throw new Error(`Expected length ${n}, got ${val.length}`); }
  };
}

// ─── Re-implement only the logic under test (pure JS, no DOM side-effects) ───
function validateTaskInput(rawValue) {
  const text = rawValue.trim();
  if (!text) {
    return {
      valid: false,
      message: rawValue.length === 0
        ? 'Task cannot be empty.'
        : 'Task cannot be blank or whitespace only.'
    };
  }
  if (text.length > 200) {
    return { valid: false, message: 'Task is too long (max 200 characters).' };
  }
  return { valid: true, message: null, text };
}

// ─── TEST SUITES ───────────────────────────────────────────

describe('Blank / empty input validation (SMARTPAY-50)', () => {
  it('rejects completely empty string ""', () => {
    const r = validateTaskInput('');
    expect(r.valid).toBe(false);
    expect(r.message).toContain('empty');
  });
  it('rejects single space " "', () => {
    const r = validateTaskInput(' ');
    expect(r.valid).toBe(false);
    expect(r.message).toContain('whitespace');
  });
  it('rejects multiple spaces "   "', () => {
    const r = validateTaskInput('   ');
    expect(r.valid).toBe(false);
    expect(r.message).toContain('whitespace');
  });
  it('rejects tab character "\\t"', () => {
    const r = validateTaskInput('\t');
    expect(r.valid).toBe(false);
  });
  it('rejects newline character "\\n"', () => {
    const r = validateTaskInput('\n');
    expect(r.valid).toBe(false);
  });
  it('rejects mixed whitespace "  \\t  \\n  "', () => {
    const r = validateTaskInput('  \t  \n  ');
    expect(r.valid).toBe(false);
  });
});

describe('Valid input acceptance', () => {
  it('accepts normal text "Buy milk"', () => {
    const r = validateTaskInput('Buy milk');
    expect(r.valid).toBe(true);
    expect(r.text).toBe('Buy milk');
  });
  it('accepts text with leading/trailing spaces (trimmed)', () => {
    const r = validateTaskInput('  Fix the bug  ');
    expect(r.valid).toBe(true);
    expect(r.text).toBe('Fix the bug');
  });
  it('accepts single character "X"', () => {
    const r = validateTaskInput('X');
    expect(r.valid).toBe(true);
  });
  it('accepts 200-character text (boundary)', () => {
    const r = validateTaskInput('A'.repeat(200));
    expect(r.valid).toBe(true);
  });
  it('returns null message on valid input', () => {
    const r = validateTaskInput('Valid task');
    expect(r.message).toBe(null);
  });
});

describe('Max length enforcement', () => {
  it('rejects text over 200 characters (201 chars)', () => {
    const r = validateTaskInput('A'.repeat(201));
    expect(r.valid).toBe(false);
    expect(r.message).toContain('200');
  });
  it('rejects text over 200 chars even with leading space', () => {
    const r = validateTaskInput(' ' + 'A'.repeat(200));
    expect(r.valid).toBe(false);
  });
  it('correct error message for too-long input', () => {
    const r = validateTaskInput('B'.repeat(250));
    expect(r.message).toBe('Task is too long (max 200 characters).');
  });
});

describe('Error message differentiation', () => {
  it('shows "empty" message for zero-length input', () => {
    const r = validateTaskInput('');
    expect(r.message).toBe('Task cannot be empty.');
  });
  it('shows "whitespace only" message for space input', () => {
    const r = validateTaskInput('   ');
    expect(r.message).toBe('Task cannot be blank or whitespace only.');
  });
});

// ─── RENDER RESULTS ─────────────────────────────────────────
window.onload = function() {
  const out = document.getElementById('results');
  suites.forEach(s => {
    const div = document.createElement('div');
    div.className = 'suite';
    div.innerHTML = `<h2>${s.name}</h2>` +
      s.tests.map(t => `
        <div class="test">
          <span class="${t.status}">${t.status === 'pass' ? '✓' : '✗'}</span>
          <span>${t.desc}</span>
          ${t.err ? `<span style="color:#e74c3c;font-size:.8rem">— ${t.err}</span>` : ''}
        </div>`).join('');
    out.appendChild(div);
  });

  document.getElementById('summary').innerHTML =
    `<strong>Results:</strong> ` +
    `<span class="green">${passed} passed</span> / ` +
    `<span class="${failed > 0 ? 'red' : 'green'}">${failed} failed</span> / ` +
    `${passed + failed} total &nbsp;|&nbsp; ` +
    `<strong>${failed === 0 ? '✅ ALL TESTS PASSED' : '❌ SOME TESTS FAILED'}</strong>`;
};
</script>
</body>
</html>
