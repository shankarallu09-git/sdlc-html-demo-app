<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker - SDLC Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 1.8rem;
      color: #4a3f82;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #667eea; }
    .input-row button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #5568d4; }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filters button {
      padding: 5px 14px;
      border: 2px solid #e0e0e0;
      background: transparent;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .filters button.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    ul { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f9f9fb;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .task-item.done { opacity: 0.5; }
    .task-item.done span { text-decoration: line-through; }
    .task-item input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer; accent-color: #667eea;
    }
    .task-item span {
      flex: 1;
      font-size: 0.92rem;
      color: #333;
    }
    .task-item .del {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .task-item .del:hover { color: #e74c3c; }
    .empty {
      text-align: center;
      color: #bbb;
      padding: 30px 0;
      font-size: 0.9rem;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 0.78rem;
      color: #aaa;
    }
    .nav-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .nav-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Task Tracker <span class="badge">DEMO</span></h1>
    <p class="subtitle">SDLC Demo App v1.0 — Simple HTML only</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()" />
      <button onclick="addTask()">+</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>

    <ul id="taskList"></ul>
    <div class="empty" id="emptyMsg" style="display:none">No tasks yet. Add one above!</div>

    <div class="stats">
      <span id="statsLeft"></span>
      <button style="background:none;border:none;cursor:pointer;color:#aaa;font-size:0.78rem" onclick="clearDone()">Clear completed</button>
    </div>

    <a class="nav-link" href="counter.html">→ Go to Counter App</a>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyMsg');
      const filtered = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );
      list.innerHTML = '';
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' done' : '');
        li.innerHTML = `
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" />
          <span>${escape(t.text)}</span>
          <button class="del" onclick="deleteTask(${t.id})">✕</button>
        `;
        list.appendChild(li);
      });
      empty.style.display = filtered.length === 0 ? 'block' : 'none';
      const left = tasks.filter(t => !t.done).length;
      document.getElementById('statsLeft').textContent = `${left} item${left !== 1 ? 's' : ''} left`;
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function escape(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    function addTask() {
      const inp = document.getElementById('taskInput');
      const text = inp.value.trim();
      if (!text) return;
      tasks.push({ id: Date.now(), text, done: false });
      inp.value = '';
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    render();
  </script>
</body>
</html>
